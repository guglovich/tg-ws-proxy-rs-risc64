name: Release

permissions:
    contents: write

on:
    push:
        tags:
            - v[0-9]+.*
    workflow_dispatch:
        inputs:
            version:
                description: 'Version tag (e.g., v1.0.8)'
                required: true
                type: string

jobs:
    create-release:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: taiki-e/create-gh-release-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

    upload-assets:
        needs: create-release
        if: github.event_name == 'push'
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-unknown-linux-musl
                      os: ubuntu-latest
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-unknown-linux-musl
                      os: ubuntu-latest
                    - target: mipsel-unknown-linux-musl
                      os: ubuntu-latest
                    - target: armv7-unknown-linux-musleabihf
                      os: ubuntu-latest
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: x86_64-pc-windows-gnu
                      os: windows-latest
                    - target: universal-apple-darwin
                      os: macos-latest
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v6

            - name: Build & upload (default)
              if: matrix.target != 'mipsel-unknown-linux-musl'
              uses: taiki-e/upload-rust-binary-action@v1
              with:
                  bin: tg-ws-proxy
                  target: ${{ matrix.target }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install nightly + rust-src (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-musl'
              uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rust-src

            - name: Install cross (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-musl'
              run: cargo install cross --locked

            - name: Build (mipsel, build-std)
              if: matrix.target == 'mipsel-unknown-linux-musl'
              run: cross +nightly build --release --bin tg-ws-proxy --target mipsel-unknown-linux-musl -Z build-std=std,panic_abort

            - name: Upload to GitHub Release (mipsel)
              if: matrix.target == 'mipsel-unknown-linux-musl'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  gh release upload "$TAG" \
                    "target/mipsel-unknown-linux-musl/release/tg-ws-proxy#tg-ws-proxy-mipsel-unknown-linux-musl" \
                    --clobber

    build-riscv64:
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  repository: valnesfjord/tg-ws-proxy-rs
                  ref: ${{ github.event.inputs.version }}

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: riscv64gc-unknown-linux-musl

            - name: Install Zig and cargo-zigbuild
              run: |
                  curl -L https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ
                  sudo mv zig-linux-x86_64-0.13.0 /usr/local/zig
                  echo "/usr/local/zig" >> $GITHUB_PATH
                  pip install cargo-zigbuild

            - name: Build for riscv64
              run: cargo zigbuild --release --target riscv64gc-unknown-linux-musl

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ github.event.inputs.version }}"
                  gh release create "$TAG" --generate-notes || true
                  gh release upload "$TAG" \
                    "target/riscv64gc-unknown-linux-musl/release/tg-ws-proxy#tg-ws-proxy-riscv64gc-unknown-linux-musl" \
                    --clobber
